<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodMate - Search</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Search</h1>
    </header>
    <main>
        <section id="search">
            <h2>Find Your Recipe</h2>
            <form action="results.html" method="GET">
                <label for="query">Search:</label>
                <input type="text" id="query" name="query" placeholder="Enter recipe name or ingredient">
                <button type="submit">Search</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 FoodMate. All rights reserved.</p>
    </footer>
</body>
</html>
